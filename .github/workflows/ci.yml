name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -U pip ".[dev]"
      - name: Test
        run: python -m pytest
      - name: Compile
        run: python -m compileall -q src tests
      - name: Lint
        run: ruff check src tests
      - name: Build wheel
        run: python -m pip wheel . --no-deps --wheel-dir dist
      - name: CLI smoke test
        run: wechat-media-ingest --version
